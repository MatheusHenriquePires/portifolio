<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockFlow | Estoque e Vendas</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --panel-2: #1d2430;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #00f5ff;
            --ok: #27c93f;
            --danger: #ff5f56;
            --warn: #fbc404;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 0%, rgba(0, 245, 255, .12), transparent 40%), var(--bg);
            color: var(--text);
            padding: 1rem;
        }

        .app {
            max-width: 1150px;
            margin: 0 auto;
            display: grid;
            gap: .9rem;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: .9rem;
        }

        .top {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: .8rem;
        }

        h1 {
            font-size: 1.15rem;
            margin-bottom: .25rem;
        }

        .muted {
            color: var(--muted);
            font-size: .82rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: .6rem;
            margin-top: .8rem;
        }

        .field {
            display: grid;
            gap: .3rem;
        }

        .field label {
            font-size: .75rem;
            color: var(--muted);
        }

        input,
        button,
        select {
            height: 38px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            padding: 0 .65rem;
        }

        button {
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: rgba(0, 245, 255, .16);
            border-color: rgba(0, 245, 255, .4);
        }

        .btn-success {
            background: rgba(39, 201, 63, .16);
            border-color: rgba(39, 201, 63, .4);
        }

        .btn-danger {
            background: rgba(255, 95, 86, .16);
            border-color: rgba(255, 95, 86, .4);
        }

        .row-actions {
            margin-top: .65rem;
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .6rem;
        }

        .metric {
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .7rem;
        }

        .metric p {
            color: var(--muted);
            font-size: .72rem;
            margin-bottom: .2rem;
        }

        .metric strong {
            font-size: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem;
        }

        th,
        td {
            padding: .52rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        th {
            color: var(--muted);
            text-transform: uppercase;
            font-size: .72rem;
            letter-spacing: .06em;
        }

        .chip {
            display: inline-flex;
            padding: .15rem .5rem;
            border-radius: 99px;
            border: 1px solid;
            font-size: .72rem;
            font-weight: 700;
        }

        .chip.ok {
            color: var(--ok);
            border-color: rgba(39, 201, 63, .4);
            background: rgba(39, 201, 63, .1);
        }

        .chip.warn {
            color: var(--warn);
            border-color: rgba(251, 188, 4, .45);
            background: rgba(251, 188, 4, .1);
        }

        .chip.danger {
            color: var(--danger);
            border-color: rgba(255, 95, 86, .45);
            background: rgba(255, 95, 86, .1);
        }

        .status {
            margin-top: .75rem;
            color: var(--warn);
            font-size: .84rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .8rem;
        }

        .history {
            max-height: 260px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            gap: .5rem;
            padding: .55rem .7rem;
            border-bottom: 1px solid var(--border);
            font-size: .82rem;
        }

        .history-item:last-child {
            border-bottom: 0;
        }

        .amount.in {
            color: var(--ok);
        }

        .amount.out {
            color: var(--danger);
        }

        @media (max-width: 860px) {
            .top {
                grid-template-columns: 1fr;
            }

            .grid-4 {
                grid-template-columns: 1fr 1fr;
            }

            .grid-2,
            .metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <section class="card top">
            <div>
                <h1>StockFlow</h1>
                <p class="muted">Sistema de gestão de estoque e vendas com saldo, faturamento e histórico.</p>

                <div class="grid-4">
                    <div class="field">
                        <label for="name">Produto</label>
                        <input id="name" placeholder="Ex: Mouse Gamer" />
                    </div>
                    <div class="field">
                        <label for="sku">SKU</label>
                        <input id="sku" placeholder="MSE-001" />
                    </div>
                    <div class="field">
                        <label for="price">Preço (R$)</label>
                        <input id="price" type="number" min="0.01" step="0.01" value="99.90" />
                    </div>
                    <div class="field">
                        <label for="qty">Estoque inicial</label>
                        <input id="qty" type="number" min="0" step="1" value="10" />
                    </div>
                </div>

                <div class="row-actions">
                    <button id="addBtn" class="btn-primary">Cadastrar produto</button>
                    <button id="seedBtn">Criar exemplo</button>
                    <button id="clearBtn" class="btn-danger">Limpar tudo</button>
                </div>
            </div>

            <div>
                <h1 style="font-size:1rem;">Movimentar estoque</h1>
                <div class="grid-4" style="grid-template-columns: 1.2fr .8fr 1fr;">
                    <div class="field">
                        <label for="target">Produto</label>
                        <select id="target"></select>
                    </div>
                    <div class="field">
                        <label for="moveQty">Quantidade</label>
                        <input id="moveQty" type="number" min="1" step="1" value="1" />
                    </div>
                    <div class="field">
                        <label for="moveType">Operação</label>
                        <select id="moveType">
                            <option value="entrada">Entrada</option>
                            <option value="saida">Saída</option>
                            <option value="venda">Venda</option>
                        </select>
                    </div>
                </div>
                <div class="row-actions">
                    <button id="applyMove" class="btn-success">Aplicar operação</button>
                </div>
                <p class="status" id="status">Cadastre produtos para iniciar.</p>
            </div>
        </section>

        <section class="card">
            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>SKU</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </section>

        <section class="grid-2">
            <article class="card">
                <h1 style="font-size:1rem;margin-bottom:.65rem;">Resumo</h1>
                <div class="metrics">
                    <div class="metric">
                        <p>Produtos cadastrados</p>
                        <strong id="mProducts">0</strong>
                    </div>
                    <div class="metric">
                        <p>Itens em estoque</p>
                        <strong id="mStock">0</strong>
                    </div>
                    <div class="metric">
                        <p>Faturamento (vendas)</p>
                        <strong id="mRevenue">R$ 0,00</strong>
                    </div>
                </div>
            </article>

            <article class="card">
                <h1 style="font-size:1rem;margin-bottom:.65rem;">Histórico de operações</h1>
                <div class="history" id="history"></div>
            </article>
        </section>
    </main>

    <script>
        const STORE_KEY = 'stockflow_state_v1';
        const state = {
            products: [],
            revenue: 0,
            history: []
        };

        const rowsEl = document.getElementById('rows');
        const targetEl = document.getElementById('target');
        const historyEl = document.getElementById('history');
        const statusEl = document.getElementById('status');

        const mProducts = document.getElementById('mProducts');
        const mStock = document.getElementById('mStock');
        const mRevenue = document.getElementById('mRevenue');

        function money(v) {
            return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function save() {
            localStorage.setItem(STORE_KEY, JSON.stringify(state));
        }

        function load() {
            const raw = localStorage.getItem(STORE_KEY);
            if (!raw) return;
            try {
                const data = JSON.parse(raw);
                state.products = data.products || [];
                state.revenue = Number(data.revenue || 0);
                state.history = data.history || [];
            } catch (_) {}
        }

        function productStatus(qty) {
            if (qty <= 0) return '<span class="chip danger">Sem estoque</span>';
            if (qty <= 3) return '<span class="chip warn">Baixo</span>';
            return '<span class="chip ok">Normal</span>';
        }

        function renderProducts() {
            if (!state.products.length) {
                rowsEl.innerHTML = '<tr><td colspan="6" style="color:#8b949e;">Nenhum produto cadastrado.</td></tr>';
            } else {
                rowsEl.innerHTML = state.products.map((p, i) => `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.sku}</td>
                        <td>${money(p.price)}</td>
                        <td>${p.qty}</td>
                        <td>${productStatus(p.qty)}</td>
                        <td><button class="btn-danger" style="height:30px;" onclick="removeProduct(${i})">Excluir</button></td>
                    </tr>
                `).join('');
            }

            targetEl.innerHTML = state.products.map((p, i) => `<option value="${i}">${p.name} (${p.sku})</option>`).join('');
            renderSummary();
            renderHistory();
            save();
        }

        function renderSummary() {
            const totalStock = state.products.reduce((sum, p) => sum + p.qty, 0);
            mProducts.textContent = state.products.length;
            mStock.textContent = totalStock;
            mRevenue.textContent = money(state.revenue);
        }

        function renderHistory() {
            if (!state.history.length) {
                historyEl.innerHTML = '<div class="history-item" style="color:#8b949e;">Sem operações ainda.</div>';
                return;
            }

            historyEl.innerHTML = [...state.history].reverse().map(h => `
                <div class="history-item">
                    <div>
                        <strong>${h.product}</strong>
                        <div style="color:#8b949e;font-size:.75rem;">${h.type} · ${new Date(h.date).toLocaleString('pt-BR')}</div>
                    </div>
                    <div class="amount ${h.effect}">${h.text}</div>
                </div>
            `).join('');
        }

        function addHistory(product, type, text, effect) {
            state.history.push({ product, type, text, effect, date: new Date().toISOString() });
            if (state.history.length > 120) state.history.shift();
        }

        function addProduct() {
            const name = document.getElementById('name').value.trim();
            const sku = document.getElementById('sku').value.trim().toUpperCase();
            const price = Number(document.getElementById('price').value);
            const qty = Number(document.getElementById('qty').value);

            if (!name || !sku || !(price > 0) || qty < 0) {
                statusEl.textContent = 'Preencha os campos corretamente.';
                return;
            }

            if (state.products.some(p => p.sku === sku)) {
                statusEl.textContent = 'SKU já cadastrado.';
                return;
            }

            state.products.push({ name, sku, price, qty });
            addHistory(name, 'cadastro', `+${qty} un`, 'in');
            statusEl.textContent = `Produto ${name} cadastrado.`;
            renderProducts();
        }

        function applyMove() {
            const idx = Number(targetEl.value);
            const qty = Number(document.getElementById('moveQty').value);
            const type = document.getElementById('moveType').value;

            if (Number.isNaN(idx) || !state.products[idx]) {
                statusEl.textContent = 'Selecione um produto.';
                return;
            }
            if (!(qty > 0)) {
                statusEl.textContent = 'Quantidade deve ser maior que 0.';
                return;
            }

            const p = state.products[idx];

            if (type === 'entrada') {
                p.qty += qty;
                addHistory(p.name, 'entrada', `+${qty} un`, 'in');
                statusEl.textContent = `Entrada aplicada em ${p.name}.`;
            }

            if (type === 'saida') {
                if (qty > p.qty) {
                    statusEl.textContent = 'Saída maior que estoque disponível.';
                    return;
                }
                p.qty -= qty;
                addHistory(p.name, 'saida', `-${qty} un`, 'out');
                statusEl.textContent = `Saída aplicada em ${p.name}.`;
            }

            if (type === 'venda') {
                if (qty > p.qty) {
                    statusEl.textContent = 'Venda maior que estoque disponível.';
                    return;
                }
                p.qty -= qty;
                const value = qty * p.price;
                state.revenue += value;
                addHistory(p.name, 'venda', `-${qty} un · ${money(value)}`, 'out');
                statusEl.textContent = `Venda registrada: ${money(value)}.`;
            }

            renderProducts();
        }

        function removeProduct(index) {
            const removed = state.products.splice(index, 1)[0];
            if (removed) {
                addHistory(removed.name, 'exclusao', 'produto removido', 'out');
                statusEl.textContent = `${removed.name} removido.`;
                renderProducts();
            }
        }
        window.removeProduct = removeProduct;

        function clearAll() {
            state.products = [];
            state.revenue = 0;
            state.history = [];
            statusEl.textContent = 'Base limpa.';
            renderProducts();
        }

        function seedData() {
            state.products = [
                { name: 'Teclado Mecânico', sku: 'TEC-001', price: 289.90, qty: 8 },
                { name: 'Mouse Gamer', sku: 'MOU-002', price: 149.90, qty: 12 },
                { name: 'Headset Pro', sku: 'HED-003', price: 329.90, qty: 4 }
            ];
            state.revenue = 0;
            state.history = [];
            addHistory('Sistema', 'seed', 'dados de exemplo criados', 'in');
            statusEl.textContent = 'Exemplo carregado.';
            renderProducts();
        }

        document.getElementById('addBtn').addEventListener('click', addProduct);
        document.getElementById('applyMove').addEventListener('click', applyMove);
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('seedBtn').addEventListener('click', seedData);

        load();
        if (!state.products.length && !state.history.length) seedData();
        else renderProducts();
    </script>
</body>

</html>
