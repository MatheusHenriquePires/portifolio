<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caixa de Mercado | Demo</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #00f5ff;
            --ok: #27c93f;
            --danger: #ff5f56;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 0%, rgba(0, 245, 255, .14), transparent 40%), var(--bg);
            color: var(--text);
            padding: 1rem;
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            gap: .8rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .9rem;
        }

        .top {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: .8rem;
        }

        h1 {
            font-size: 1.1rem;
            margin-bottom: .25rem;
        }

        .muted {
            color: var(--muted);
            font-size: .82rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: .55rem;
            margin-top: .7rem;
        }

        .field {
            display: grid;
            gap: .3rem;
        }

        .field label {
            color: var(--muted);
            font-size: .74rem;
        }

        input,
        button,
        select {
            height: 38px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .03);
            color: var(--text);
            padding: 0 .6rem;
        }

        button {
            cursor: pointer;
            font-weight: 700;
        }

        .btn-primary {
            background: rgba(0, 245, 255, .15);
            border-color: rgba(0, 245, 255, .35);
        }

        .btn-success {
            background: rgba(39, 201, 63, .15);
            border-color: rgba(39, 201, 63, .35);
        }

        .btn-danger {
            background: rgba(255, 95, 86, .16);
            border-color: rgba(255, 95, 86, .4);
        }

        .row {
            display: flex;
            gap: .5rem;
            margin-top: .6rem;
            flex-wrap: wrap;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.1fr .9fr;
            gap: .8rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem;
        }

        th,
        td {
            padding: .55rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        th {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .05em;
            font-size: .72rem;
        }

        .pill {
            font-size: .7rem;
            padding: .15rem .45rem;
            border-radius: 99px;
            border: 1px solid;
            display: inline-flex;
        }

        .ok {
            color: var(--ok);
            border-color: rgba(39, 201, 63, .45);
            background: rgba(39, 201, 63, .12);
        }

        .low {
            color: #fbc404;
            border-color: rgba(251, 188, 4, .45);
            background: rgba(251, 188, 4, .12);
        }

        .out {
            color: var(--danger);
            border-color: rgba(255, 95, 86, .45);
            background: rgba(255, 95, 86, .12);
        }

        .summary {
            display: grid;
            gap: .5rem;
            margin-top: .4rem;
        }

        .sum-row {
            display: flex;
            justify-content: space-between;
            font-size: .88rem;
            color: var(--muted);
        }

        .sum-row strong {
            color: var(--text);
        }

        .sum-row.total {
            font-size: 1rem;
            color: var(--text);
            border-top: 1px dashed var(--border);
            padding-top: .55rem;
            margin-top: .2rem;
        }

        .status {
            margin-top: .6rem;
            color: #fbc404;
            font-size: .84rem;
        }

        .history {
            max-height: 200px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: .5rem;
        }

        .history-item {
            padding: .5rem .65rem;
            border-bottom: 1px solid var(--border);
            font-size: .8rem;
            color: var(--muted);
        }

        .history-item:last-child {
            border-bottom: 0;
        }

        @media (max-width: 900px) {
            .top,
            .layout {
                grid-template-columns: 1fr;
            }

            .grid-4 {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <section class="card top">
            <div>
                <h1>Caixa de Mercado (Demo Web)</h1>
                <p class="muted">Interface em HTML + JavaScript para uso direto no navegador.</p>

                <div class="grid-4">
                    <div class="field">
                        <label for="pName">Produto</label>
                        <input id="pName" placeholder="Arroz 5kg" />
                    </div>
                    <div class="field">
                        <label for="pSku">SKU</label>
                        <input id="pSku" placeholder="ARR-001" />
                    </div>
                    <div class="field">
                        <label for="pPrice">Preço</label>
                        <input id="pPrice" type="number" step="0.01" min="0.01" value="19.90" />
                    </div>
                    <div class="field">
                        <label for="pStock">Estoque</label>
                        <input id="pStock" type="number" step="1" min="0" value="10" />
                    </div>
                </div>

                <div class="row">
                    <button id="addProduct" class="btn-primary">Cadastrar produto</button>
                    <button id="seed" >Carregar exemplo</button>
                    <button id="resetAll" class="btn-danger">Resetar base</button>
                </div>
            </div>

            <div>
                <h1 style="font-size:1rem;">Operação de caixa</h1>
                <div class="grid-4" style="grid-template-columns: 1.2fr .7fr 1fr 1fr;">
                    <div class="field">
                        <label for="cartProduct">Produto</label>
                        <select id="cartProduct"></select>
                    </div>
                    <div class="field">
                        <label for="cartQty">Qtd</label>
                        <input id="cartQty" type="number" min="1" step="1" value="1" />
                    </div>
                    <div class="field">
                        <label for="discount">Desconto (R$)</label>
                        <input id="discount" type="number" min="0" step="0.01" value="0" />
                    </div>
                    <div class="field">
                        <label for="payment">Pagamento</label>
                        <select id="payment">
                            <option value="dinheiro">Dinheiro</option>
                            <option value="cartao">Cartão</option>
                            <option value="pix">Pix</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <button id="addToCart">Adicionar ao carrinho</button>
                    <button id="finishSale" class="btn-success">Finalizar venda</button>
                    <button id="cancelSale" class="btn-danger">Cancelar venda</button>
                </div>
                <p class="status" id="status">Sistema pronto.</p>
            </div>
        </section>

        <section class="layout">
            <article class="card">
                <h1 style="font-size:1rem;">Estoque</h1>
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="stockRows"></tbody>
                </table>
            </article>

            <article class="card">
                <h1 style="font-size:1rem;">Carrinho atual</h1>
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Qtd</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="cartRows"></tbody>
                </table>

                <div class="summary">
                    <div class="sum-row"><span>Subtotal</span><strong id="sumSubtotal">R$ 0,00</strong></div>
                    <div class="sum-row"><span>Desconto</span><strong id="sumDiscount">R$ 0,00</strong></div>
                    <div class="sum-row total"><span>Total</span><strong id="sumTotal">R$ 0,00</strong></div>
                </div>

                <div class="history" id="history"></div>
            </article>
        </section>
    </main>

    <script>
        const KEY = 'caixa_mercado_demo_v2';
        const state = { products: [], cart: [], sales: [] };

        const brl = value => Number(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function save() {
            localStorage.setItem(KEY, JSON.stringify(state));
        }

        function load() {
            try {
                const data = JSON.parse(localStorage.getItem(KEY) || '{}');
                state.products = data.products || [];
                state.cart = data.cart || [];
                state.sales = data.sales || [];
            } catch (_) {}
        }

        function seedBase() {
            state.products = [
                { sku: 'ARR-001', name: 'Arroz 5kg', price: 29.9, stock: 20 },
                { sku: 'FEJ-002', name: 'Feijão 1kg', price: 8.5, stock: 35 },
                { sku: 'LEI-003', name: 'Leite 1L', price: 5.2, stock: 50 },
                { sku: 'CAF-004', name: 'Café 500g', price: 16.9, stock: 25 }
            ];
            state.cart = [];
            state.sales = [];
        }

        function statusText(stock) {
            if (stock <= 0) return '<span class="pill out">Sem estoque</span>';
            if (stock <= 3) return '<span class="pill low">Estoque baixo</span>';
            return '<span class="pill ok">Disponível</span>';
        }

        function renderStock() {
            const tbody = document.getElementById('stockRows');
            if (!state.products.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="muted">Sem produtos cadastrados.</td></tr>';
            } else {
                tbody.innerHTML = state.products.map(p => `
                    <tr>
                      <td>${p.name}<br><span class="muted">${p.sku}</span></td>
                      <td>${brl(p.price)}</td>
                      <td>${p.stock}</td>
                      <td>${statusText(p.stock)}</td>
                    </tr>
                `).join('');
            }

            const select = document.getElementById('cartProduct');
            select.innerHTML = state.products.map((p, i) => `<option value="${i}">${p.name} (${p.sku})</option>`).join('');
        }

        function cartSubtotal() {
            return state.cart.reduce((acc, item) => acc + item.subtotal, 0);
        }

        function renderCart() {
            const tbody = document.getElementById('cartRows');
            if (!state.cart.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="muted">Carrinho vazio.</td></tr>';
            } else {
                tbody.innerHTML = state.cart.map(item => `
                    <tr>
                      <td>${item.name}</td>
                      <td>${item.qty}</td>
                      <td>${brl(item.subtotal)}</td>
                    </tr>
                `).join('');
            }

            const discount = Number(document.getElementById('discount').value || 0);
            const subtotal = cartSubtotal();
            const total = Math.max(0, subtotal - discount);

            document.getElementById('sumSubtotal').textContent = brl(subtotal);
            document.getElementById('sumDiscount').textContent = brl(discount);
            document.getElementById('sumTotal').textContent = brl(total);
        }

        function renderHistory() {
            const history = document.getElementById('history');
            if (!state.sales.length) {
                history.innerHTML = '<div class="history-item">Sem vendas finalizadas.</div>';
                return;
            }

            history.innerHTML = [...state.sales].reverse().slice(0, 12).map(sale => `
                <div class="history-item">
                    Venda ${sale.id} · ${sale.payment} · ${sale.items.length} item(ns) · <strong>${brl(sale.total)}</strong>
                </div>
            `).join('');
        }

        function renderAll() {
            renderStock();
            renderCart();
            renderHistory();
            save();
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        document.getElementById('addProduct').addEventListener('click', () => {
            const name = document.getElementById('pName').value.trim();
            const sku = document.getElementById('pSku').value.trim().toUpperCase();
            const price = Number(document.getElementById('pPrice').value);
            const stock = Number(document.getElementById('pStock').value);

            if (!name || !sku || !(price > 0) || stock < 0) {
                setStatus('Dados inválidos para cadastro.');
                return;
            }
            if (state.products.some(p => p.sku === sku)) {
                setStatus('SKU já existe.');
                return;
            }

            state.products.push({ name, sku, price, stock });
            setStatus(`Produto ${name} cadastrado.`);
            renderAll();
        });

        document.getElementById('addToCart').addEventListener('click', () => {
            const idx = Number(document.getElementById('cartProduct').value);
            const qty = Number(document.getElementById('cartQty').value);
            const product = state.products[idx];

            if (!product || !(qty > 0)) {
                setStatus('Selecione produto e quantidade válida.');
                return;
            }
            if (product.stock < qty) {
                setStatus('Estoque insuficiente para esse item.');
                return;
            }

            product.stock -= qty;
            state.cart.push({ sku: product.sku, name: product.name, qty, price: product.price, subtotal: qty * product.price });
            setStatus(`${qty}x ${product.name} adicionado ao carrinho.`);
            renderAll();
        });

        document.getElementById('cancelSale').addEventListener('click', () => {
            for (const item of state.cart) {
                const product = state.products.find(p => p.sku === item.sku);
                if (product) product.stock += item.qty;
            }
            state.cart = [];
            document.getElementById('discount').value = 0;
            setStatus('Venda atual cancelada e estoque restaurado.');
            renderAll();
        });

        document.getElementById('finishSale').addEventListener('click', () => {
            if (!state.cart.length) {
                setStatus('Carrinho vazio.');
                return;
            }

            const subtotal = cartSubtotal();
            const discount = Number(document.getElementById('discount').value || 0);
            if (discount < 0 || discount > subtotal) {
                setStatus('Desconto inválido.');
                return;
            }

            const payment = document.getElementById('payment').value;
            const total = subtotal - discount;
            const id = (Date.now().toString(36)).toUpperCase().slice(-6);

            state.sales.push({ id, items: [...state.cart], subtotal, discount, total, payment });
            state.cart = [];
            document.getElementById('discount').value = 0;
            setStatus(`Venda ${id} finalizada com sucesso (${brl(total)}).`);
            renderAll();
        });

        document.getElementById('discount').addEventListener('input', renderCart);
        document.getElementById('seed').addEventListener('click', () => {
            seedBase();
            setStatus('Exemplo carregado.');
            renderAll();
        });
        document.getElementById('resetAll').addEventListener('click', () => {
            localStorage.removeItem(KEY);
            seedBase();
            setStatus('Base resetada.');
            renderAll();
        });

        load();
        if (!state.products.length) seedBase();
        renderAll();
    </script>
</body>

</html>
