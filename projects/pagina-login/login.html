<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <h1>Login <span>My Chat</span></h1>
    <form class="loginform" id="loginForm">
        <div class="login-URL">
            <label for="url">URL do servidor </label>
            <input type="text" id="url" placeholder="Digite a URL do servidor">
        </div>

        <div class="login-email">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite seu email">
        </div>

        <div class="login-Senha">
            <label for="nome">Nickname </label>
            <input type="text" id="nome" placeholder="Nickname">
        </div>

        <button id="meuBotao" type="submit">Clica aqui</button>
    </form>

    <p id="feedback"></p>

    <script src="login.js" defer></script>
</body>

</html>
