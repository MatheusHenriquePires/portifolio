<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Chat | Login</title>
    <link rel="stylesheet" href="login.css" />
</head>

<body>
    <main class="auth-shell">
        <section class="auth-card" id="login-card">
            <p class="eyebrow">Sistema de Acesso</p>
            <h1>Entrar no <span>My Chat</span></h1>
            <p class="subtitle">Faça login para continuar.</p>

            <form class="login-form" id="loginForm" novalidate>
                <div class="field">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required />
                </div>

                <div class="field">
                    <label for="password">Senha</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" placeholder="Sua senha" autocomplete="current-password" minlength="6" required />
                        <button type="button" class="btn-toggle" id="togglePassword" aria-label="Mostrar senha">👁</button>
                    </div>
                </div>

                <label class="remember-row">
                    <input type="checkbox" id="remember" />
                    <span>Lembrar meu acesso neste navegador</span>
                </label>

                <button class="btn-submit" id="submitBtn" type="submit">Entrar</button>
            </form>

            <p class="feedback" id="feedback" role="status" aria-live="polite"></p>
            <p class="hint">Demo local: use qualquer e-mail válido e senha com 6+ caracteres.</p>
        </section>

        <section class="session-card hidden" id="sessionCard">
            <p class="eyebrow">Sessão ativa</p>
            <h2>Login realizado</h2>
            <p id="sessionInfo"></p>
            <button id="logoutBtn" class="btn-logout" type="button">Sair</button>
        </section>
    </main>

    <script src="login.js" defer></script>
</body>

</html>
